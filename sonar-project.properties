sonar.sourceEncoding=UTF-8

# Do not analyze build artifacts (Gradle HTML reports create false CSS smells).
sonar.exclusions=\
  **/build/**,\
  **/.dart_tool/**,\
  **/Generated.xcconfig,\
  **/Flutter.podspec,\
  **/problems-report.html,\
  **/coverage/**

sonar.coverage.exclusions=\
  **/test/**,\
  **/patrol_tests/**
