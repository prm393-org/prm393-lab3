sonar.sourceEncoding=UTF-8

# Không scan artifact sinh ra khi build (Gradle HTML report gây hàng loạt CSS smell giả).
sonar.exclusions=\
  **/build/**,\
  **/.dart_tool/**,\
  **/Generated.xcconfig,\
  **/Flutter.podspec,\
  **/problems-report.html,\
  **/coverage/**

sonar.coverage.exclusions=\
  **/test/**,\
  **/patrol_tests/**
